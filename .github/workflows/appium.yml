name: CareersCloud Appium Automation

on:
  push:
    branches:
      - live
  pull_request:
    branches:
      - live

jobs:
  appium-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Java Version
        run: java -version

      - name: Build Project with Maven
        run: mvn clean install -Dmaven.compiler.release=17  # Force Java 17

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up ADB for real device
        run: |
          echo "y" | sudo apt-get install android-tools-adb
          adb devices

      - name: Start Appium Server
        run: |
          npm install -g appium
          appium -v
          nohup appium > appium.log 2>&1 &
          sleep 10

      - name: Build Project with Maven
        run: mvn clean install

      - name: Run Appium Tests
        run: mvn test